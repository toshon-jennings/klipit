<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Klipit — your personal link-memory browser extension">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf6ec"/>
      <stop offset="1" stop-color="#f2ece0"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c8b7c"/>
      <stop offset="1" stop-color="#1b675c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf6ec"/>
      <stop offset="1" stop-color="#efe6d3"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grain texture -->
  <rect width="1280" height="640" fill="url(#bg)" opacity="0.5"/>
  <g opacity="0.03">
    <rect x="0" y="0" width="1280" height="640" fill="none" stroke="#8a7e6b" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#8a7e6b" stroke-width="0.3"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#8a7e6b" stroke-width="0.3"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#8a7e6b" stroke-width="0.3"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#8a7e6b" stroke-width="0.3"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#8a7e6b" stroke-width="0.3"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#8a7e6b" stroke-width="0.3"/>
  </g>

  <!-- logo icon (book + ribbon) - centered left area -->
  <g transform="translate(180, 120)">
    <!-- book cover tile -->
    <rect x="0" y="0" width="400" height="400" rx="90" fill="url(#tile)"/>
    <rect x="0" y="0" width="400" height="400" rx="90" fill="url(#sheen)"/>
    <rect x="3" y="3" width="394" height="394" rx="88" fill="none" stroke="#0f4a42" stroke-opacity="0.35" stroke-width="4"/>

    <!-- ribbon bookmark -->
    <g>
      <!-- shadow -->
      <path d="M148 100a20 20 0 0 1 20-20h94a20 20 0 0 1 20 20v230L220 280 148 332Z"
            transform="translate(5 8)" fill="#0f4a42" opacity="0.25"/>
      <!-- ribbon body -->
      <path d="M148 100a20 20 0 0 1 20-20h94a20 20 0 0 1 20 20v230L220 280 148 332Z"
            fill="url(#ribbon)"/>
      <!-- marginalia lines -->
      <rect x="180" y="150" width="86" height="16" rx="8" fill="#1f6f63"/>
      <rect x="180" y="190" width="60" height="16" rx="8" fill="#1f6f63"/>
      <rect x="180" y="230" width="46" height="16" rx="8" fill="#c9842a"/>
    </g>
  </g>

  <!-- text: Klipit -->
  <text x="640" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="url(#textGrad)" letter-spacing="-2">
    Klipit
  </text>

  <!-- tagline -->
  <text x="640" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#2c8b7c" letter-spacing="1">
    your personal link-memory browser extension
  </text>

  <!-- thin decorative line -->
  <line x1="640" y1="375" x2="880" y2="375" stroke="#2c8b7c" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- badges row -->
  <g transform="translate(640, 405)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#2c8b7c" opacity="0.12"/>
    <text x="40" y="19" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2c8b7c" text-anchor="middle" font-weight="600">Chrome</text>

    <rect x="95" y="0" width="80" height="28" rx="14" fill="#2c8b7c" opacity="0.12"/>
    <text x="135" y="19" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2c8b7c" text-anchor="middle" font-weight="600">Firefox</text>

    <rect x="190" y="0" width="95" height="28" rx="14" fill="#2c8b7c" opacity="0.12"/>
    <text x="237" y="19" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2c8b7c" text-anchor="middle" font-weight="600">Local-first</text>

    <rect x="300" y="0" width="80" height="28" rx="14" fill="#2c8b7c" opacity="0.12"/>
    <text x="340" y="19" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#2c8b7c" text-anchor="middle" font-weight="600">No account</text>
  </g>
</svg>
