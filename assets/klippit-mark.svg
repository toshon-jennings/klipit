<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Klippit">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c8b7c"/>
      <stop offset="1" stop-color="#1b675c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf6ec"/>
      <stop offset="1" stop-color="#efe6d3"/>
    </linearGradient>
  </defs>

  <!-- book cover tile -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#tile)"/>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#sheen)"/>
  <rect x="6.75" y="6.75" width="114.5" height="114.5" rx="29.25" fill="none" stroke="#0f4a42" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- ribbon bookmark -->
  <g>
    <!-- soft cast shadow -->
    <path d="M44 30a6 6 0 0 1 6-6h28a6 6 0 0 1 6 6v68L66 84 44 98Z"
          transform="translate(1.5 2.5)" fill="#0f4a42" opacity="0.28"/>
    <path d="M44 30a6 6 0 0 1 6-6h28a6 6 0 0 1 6 6v68L66 84 44 98Z" fill="url(#ribbon)"/>
    <!-- marginalia: two written lines + an ochre accent -->
    <rect x="53" y="44" width="26" height="5" rx="2.5" fill="#1f6f63"/>
    <rect x="53" y="56" width="18" height="5" rx="2.5" fill="#1f6f63"/>
    <rect x="53" y="68" width="14" height="5" rx="2.5" fill="#c9842a"/>
  </g>
</svg>
